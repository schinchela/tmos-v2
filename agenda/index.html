<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>TMOS Public Agenda</title>

  <style>
    :root {
      --bg: #070b16;
      --panel: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --muted: #9fb0cc;
      --line: rgba(255,255,255,0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left,#1a1d46 0%,#070b16 55%),
        #070b16;
      color: var(--text);
      font-family:
        Inter,
        Segoe UI,
        sans-serif;
      padding: 32px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero,
    .module-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--muted);
      font-size: .8rem;
    }

    h1 {
      margin: 12px 0;
      font-size: 2.5rem;
    }

    h3 {
      margin: 0;
    }

    .panel-header {
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    th {
      color: var(--muted);
      font-size: .85rem;
      text-transform: uppercase;
    }

    .error {
      color: #ff8a8a;
    }

    .loading {
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    a {
      color: #8cb8ff;
    }
  </style>
</head>

<body>

<div class="container">

  <section class="hero">
    <p class="eyebrow">
      TMOS PUBLIC AGENDA
    </p>

    <h1 id="meetingTitle">
      Loading...
    </h1>

    <p id="meetingMeta"></p>
  </section>

  <div
    id="agendaContent"
    class="loading"
  >
    Loading agenda...
  </div>

</div>

<script>
const API_URL =
  "https://api.tmos.rowepal.com";

const token =
  new URLSearchParams(
    window.location.search
  ).get("token") || "";

if (!token) {
  document.getElementById(
    "meetingTitle"
  ).textContent =
    "Agenda Link Missing";

  document.getElementById(
    "agendaContent"
  ).innerHTML = `
    <div class="module-panel error">
      Please open a published agenda link.
    </div>
  `;
} else {
  loadAgenda();
}

async function loadAgenda() {
  try {
    const response = await fetch(
      `${API_URL}/api/public-agenda/${token}`
    );

    const result =
      await response.json();

    if (!result.success) {
      throw new Error(
        result.error || "Agenda not found"
      );
    }

    renderAgenda(result.data);
  } catch (error) {
    document.getElementById(
      "agendaContent"
    ).innerHTML = `
      <div class="module-panel error">
        ${error.message}
      </div>
    `;
  }
}

function renderAgenda(data) {
  const meeting =
    data.meeting || {};

  document.getElementById(
    "meetingTitle"
  ).textContent =
    meeting.meeting_title ||
    "Meeting Agenda";

  document.getElementById(
    "meetingMeta"
  ).textContent =
    [
      meeting.meeting_date,
      meeting.meeting_theme
    ]
      .filter(Boolean)
      .join(" • ");

  document.getElementById(
    "agendaContent"
  ).innerHTML =
    renderMeetingInfo(meeting) +
    renderRoles(data.roles || []) +
    renderSpeeches(data.speeches || []) +
    renderTableTopics(data.tableTopics || []);
}

function renderMeetingInfo(meeting) {
  return `
    <section class="module-panel">
      <div class="panel-header">
        <h3>Meeting Information</h3>
      </div>

      <table>
        <tbody>
          <tr>
            <td>Theme</td>
            <td>${meeting.meeting_theme || "-"}</td>
          </tr>

          <tr>
            <td>Date</td>
            <td>${meeting.meeting_date || "-"}</td>
          </tr>

          <tr>
            <td>Start Time</td>
            <td>${meeting.start_time || "-"}</td>
          </tr>

          <tr>
            <td>End Time</td>
            <td>${meeting.end_time || "-"}</td>
          </tr>

          <tr>
            <td>Venue</td>
            <td>${meeting.venue || "-"}</td>
          </tr>

          <tr>
            <td>Online Link</td>
            <td>
              ${
                meeting.online_link
                  ? `<a href="${meeting.online_link}" target="_blank">${meeting.online_link}</a>`
                  : "-"
              }
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  `;
}

function renderRoles(roles) {
  return `
    <section class="module-panel">
      <div class="panel-header">
        <h3>Agenda Roles</h3>
      </div>

      <table>
        <thead>
          <tr>
            <th>Role</th>
            <th>Assigned To</th>
          </tr>
        </thead>

        <tbody>
          ${roles.map(role => `
            <tr>
              <td>${role.role_name || "-"}</td>
              <td>${role.planned_display_name || "-"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>
  `;
}

function renderSpeeches(speeches) {
  return `
    <section class="module-panel">
      <div class="panel-header">
        <h3>Prepared Speeches</h3>
      </div>

      <table>
        <thead>
          <tr>
            <th>Speaker</th>
            <th>Speech Title</th>
            <th>Evaluator</th>
          </tr>
        </thead>

        <tbody>
          ${speeches.map(speech => `
            <tr>
              <td>${speech.planned_speaker_name || "-"}</td>
              <td>${speech.speech_title || "-"}</td>
              <td>${speech.planned_evaluator_name || "-"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>
  `;
}

function renderTableTopics(participants) {
  return `
    <section class="module-panel">
      <div class="panel-header">
        <h3>Table Topics Participants</h3>
      </div>

      <table>
        <tbody>
          ${participants.map(person => `
            <tr>
              <td>${person.participant_name || "-"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>
  `;
}
</script>

</body>
</html>
