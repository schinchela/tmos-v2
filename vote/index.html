<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMOS Voting</title>

  <style>
    :root {
      --bg: #070b16;
      --panel: rgba(255,255,255,0.08);
      --panel-strong: rgba(255,255,255,0.14);
      --text: #eef4ff;
      --muted: #9fb0cc;
      --line: rgba(255,255,255,0.12);
      --accent: #7c5cff;
      --accent-2: #00d4ff;
      --success: #32d583;
      --danger: #f97066;
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,92,255,0.35), transparent 35%),
        radial-gradient(circle at top right, rgba(0,212,255,0.22), transparent 30%),
        linear-gradient(135deg, #050712 0%, #0b1022 50%, #060914 100%);
    }

    .page {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(20px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.04em;
    }

    .hero p,
    .message,
    small {
      color: var(--muted);
      line-height: 1.6;
    }

    .panel {
      margin-bottom: 18px;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 21px;
    }

    .choices {
      display: grid;
      gap: 12px;
      padding: 20px 22px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.45);
      cursor: pointer;
      transition: 0.15s ease;
    }

    .choice:hover {
      background: rgba(30, 41, 59, 0.75);
      border-color: rgba(0, 212, 255, 0.45);
    }

    .choice input[type="radio"] {
      appearance: auto;
      width: 18px;
      height: 18px;
      accent-color: var(--accent-2);
      cursor: pointer;
    }

    .choice span {
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(50,213,131,0.15);
      color: var(--success);
      font-size: 12px;
      font-weight: 800;
    }

    .primary-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      cursor: pointer;
      color: var(--text);
      font: inherit;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 36px rgba(124,92,255,0.38);
    }

    .primary-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .notice {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      color: var(--muted);
      line-height: 1.6;
    }

    .success {
      color: var(--success);
      font-weight: 900;
    }

    .danger {
      color: var(--danger);
      font-weight: 900;
    }

    @media (max-width: 620px) {
      .page { padding: 18px; }
      h1 { font-size: 26px; }
      .panel-header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">TMOS Public Voting</p>
      <h1>Meeting Awards Voting</h1>
      <p id="pageIntro">Loading voting ballot...</p>
    </section>

    <section id="ballot"></section>

    <section class="panel">
      <div class="choices">
        <button class="primary-btn" id="submitVoteBtn" type="button" disabled>
          Submit Vote
        </button>
        <p class="message" id="voteMessage"></p>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://api.tmos.rowepal.com"; 

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug") || window.location.pathname.split("/").filter(Boolean).pop();

    let groupedAwards = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function apiRequest(path, options = {}) {
      const response = await fetch(`${API_URL}${path}`, {
        method: options.method || "GET",
        headers: {
          "Content-Type": "application/json"
        },
        body: options.body ? JSON.stringify(options.body) : undefined
      });

      const data = await response.json().catch(() => null);

      if (!response.ok || data?.success === false) {
        throw new Error(data?.error || "Request failed");
      }

      return data;
    }

    function groupCandidates(candidates) {
      const map = new Map();

      candidates.forEach((candidate) => {
        const key = candidate.award_key || "UNKNOWN";

        if (!map.has(key)) {
          map.set(key, {
            awardKey: key,
            awardName: candidate.award_name || key,
            candidates: []
          });
        }

        map.get(key).candidates.push(candidate);
      });

      return [...map.values()];
    }

    function renderBallot() {
      const ballot = document.getElementById("ballot");
      const submitBtn = document.getElementById("submitVoteBtn");

      if (!groupedAwards.length) {
        ballot.innerHTML = `
          <div class="notice">
            No award candidates are available for this voting link.
          </div>
        `;
        submitBtn.disabled = true;
        return;
      }

      ballot.innerHTML = groupedAwards.map((group) => `
        <section class="panel" data-award-key="${escapeHtml(group.awardKey)}">
          <div class="panel-header">
            <h2>${escapeHtml(group.awardName)}</h2>
            <span class="badge">${group.candidates.length} candidates</span>
          </div>

          <div class="choices">
            ${group.candidates.map((candidate) => `
              <label class="choice">
                <input
                  type="radio"
                  name="award_${escapeHtml(group.awardKey)}"
                  value="${escapeHtml(candidate.id)}"
                  data-award-key="${escapeHtml(group.awardKey)}"
                />
                <span>${escapeHtml(candidate.participant_name || "-")}</span>
              </label>
            `).join("")}
          </div>
        </section>
      `).join("");

      submitBtn.disabled = false;
    }

    async function loadBallot() {
      const intro = document.getElementById("pageIntro");
      const message = document.getElementById("voteMessage");

      if (!slug || slug === "vote.html") {
        intro.innerHTML = `<span class="danger">Voting link is missing.</span>`;
        message.textContent = "Please open the voting link shared by the meeting admin.";
        return;
      }

      try {
        const response = await apiRequest(`/api/vote/${encodeURIComponent(slug)}`);
        const session = response.data?.session;
        const candidates = response.data?.candidates || [];

        if (session?.status && session.status !== "OPEN") {
          intro.innerHTML = `<span class="danger">Voting is closed.</span>`;
          document.getElementById("submitVoteBtn").disabled = true;
          return;
        }

        groupedAwards = groupCandidates(candidates);
        intro.textContent = "Select one candidate for each award and submit your vote.";
        renderBallot();
      } catch (error) {
        intro.innerHTML = `<span class="danger">Unable to load voting ballot.</span>`;
        message.textContent = error.message;
      }
    }

    async function submitVote() {
      const button = document.getElementById("submitVoteBtn");
      const message = document.getElementById("voteMessage");

      const votes = groupedAwards.map((group) => {
        const selected = document.querySelector(`input[name="award_${CSS.escape(group.awardKey)}"]:checked`);

        return selected
          ? {
              awardKey: group.awardKey,
              candidateId: selected.value
            }
          : null;
      }).filter(Boolean);

      if (votes.length !== groupedAwards.length) {
        message.textContent = "Please vote for every award before submitting.";
        return;
      }

      button.disabled = true;
      button.textContent = "Submitting...";
      message.textContent = "Submitting your vote...";

      try {
        await apiRequest(`/api/vote/${encodeURIComponent(slug)}`, {
          method: "POST",
          body: { votes }
        });

        document.getElementById("ballot").innerHTML = `
          <div class="notice">
            <p class="success">Vote submitted successfully.</p>
            <p>Thank you. You may now close this page.</p>
          </div>
        `;

        button.style.display = "none";
        message.textContent = "";
      } catch (error) {
        button.disabled = false;
        button.textContent = "Submit Vote";
        message.textContent = error.message;
      }
    }

    document.getElementById("submitVoteBtn").addEventListener("click", submitVote);
    loadBallot();
  </script>
</body>
</html>
